# Hyprland Omarchy config overrides
# Add all customisations here

# My bindings
$browser = firefox
$terminal = kitty
unbind = SUPER, B
bindd = SUPER, B, Browser, exec, $browser
unbind = SUPER SHIFT, E
bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-or-focus thunderbird
unbind = SUPER SHIFT ALT, M 
bindd = SUPER SHIFT ALT, M, exec, exec, $terminal -o font_size=9 claimp

# Make Nautilus a floating floating-window and set a good default size
windowrule = float on, persistent_size on, match:class ^(org\.gnome\.Nautilus)$
windowrule = size 1200 900, match:tag floating-window

# Make Thunderbird float
windowrule = float on, persistent_size on, match:class ^(org\.mozilla\.Thunderbird)$

# Set inputs 
input {
  # Use multiple keyboard layouts and switch between them with Left Alt + Right Alt
  # kb_layout = us,dk,eu

  # Use a specific keyboard variant if needed (e.g. intl for international keyboards)
  # kb_variant = intl

  kb_layout = gb
  kb_options = compose:caps # ,grp:alts_toggle

  # Change speed of keyboard repeat
  repeat_rate = 40
  repeat_delay = 250

  # Start with numlock on by default
  numlock_by_default = true

  # Increase sensitivity for mouse/trackpad (default: 0)
  sensitivity = -.5

  # Turn off mouse acceleration (default: adaptive)
  # accel_profile = flat

  touchpad {
    # Use natural (inverse) scrolling
    # natural_scroll = true

    # Use two-finger clicks for right-click instead of lower-right corner
    clickfinger_behavior = true

    # Control the speed of your scrolling
    scroll_factor = 0.4

    # Enable the touchpad while typing
    # disable_while_typing = false

    # Left-click-and-drag with three fingers
    # drag_3fg = 1
  }
}

# Set smaller gaps and rounding 
general {
    gaps_in = 2
    gaps_out = 2
}
decoration {
    rounding = 8
}


